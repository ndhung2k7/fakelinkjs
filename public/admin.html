<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - URL Shortener</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-body">
    <!-- Background GIF -->
    <div class="background-gif">
        <img src="https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop" alt="Background">
        <div class="overlay"></div>
    </div>

    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <div class="login-card glass-modern">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-link"></i>
                </div>
                <h1>URL Shortener</h1>
                <p class="logo-subtitle">Admin Panel</p>
            </div>

            <!-- Welcome Text -->
            <div class="welcome-text">
                <h2>Chào mừng trở lại!</h2>
                <p>Vui lòng đăng nhập để quản trị hệ thống</p>
            </div>
            
            <form id="loginForm">
                <!-- Username Field -->
                <div class="input-group glass-input-modern">
                    <i class="fas fa-user"></i>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Tên đăng nhập" 
                        required
                        autocomplete="off"
                    >
                </div>
                
                <!-- Password Field with Show/Hide -->
                <div class="input-group glass-input-modern password-field">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mật khẩu" 
                        required
                    >
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>
                
                <!-- Login Button with Loading -->
                <button type="submit" id="loginBtn" class="btn-modern">
                    <span class="btn-text">Đăng nhập</span>
                    <span class="btn-loader hidden">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>
            
            <!-- Error Message -->
            <div id="loginError" class="error-message-modern hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> Demo: admin / admin123</p>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2024 URL Shortener. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard (ẩn khi chưa login) -->
    <div id="dashboardContainer" class="dashboard-container hidden">
        <!-- ... (giữ nguyên phần dashboard cũ) ... -->
    </div>

    <!-- Notification -->
    <div id="notification" class="notification glass hidden">
        <i class="fas fa-info-circle"></i>
        <span id="notificationMessage"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
